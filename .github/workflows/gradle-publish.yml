name: CI/CD

on:
  push:
    branches:
      - master
      - develop
      - 'epic/*/develop'
      - 'feature*'
  pull_request:
    branches:
      - master
      - develop
      - 'epic/*/develop'
      - 'feature*'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Set timezone
        run: echo "TZ=Australia/Canberra" >> $GITHUB_ENV

      - name: Build
        run: ./gradlew clean build
        env:
          JAVA_TOOL_OPTIONS: -Dhttps.protocols=TLSv1.2

      - name: Publish
        if: github.event_name == 'push' && github.ref != 'refs/pull/*'
        run: ./gradlew publish
        env:
          JAVA_TOOL_OPTIONS: -Dhttps.protocols=TLSv1.2
          GRADLE_PUBLISH_TOKEN: ${{ secrets.GRADLE_PUBLISH_TOKEN }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
